<section class="container">
    <h2>Мои билеты</h2>

    {% if tickets %}
        <div class="cards">
            {% for ticket in tickets %}
                <div class="card">
                    <h3>{{ ticket.party.title }}</h3>
                    <p>📍 {{ ticket.party.city }}</p>
                    <p>📅 {{ ticket.party.date.strftime('%d.%m.%Y') }}</p>
                    <p>🎟 Кол-во: {{ ticket.quantity }}</p>
                    <p>Статус: {{ ticket.status }}</p>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>У вас пока нет билетов</p>
    {% endif %}
</section>
