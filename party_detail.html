<h2>{{ party.title }}</h2>

<p>📍 {{ party.city }}</p>

<p>
📅 {{ party.date.strftime('%d.%m.%Y') if party.date else 'Дата не указана' }}
</p>

<p>💰 Цена: {{ party.price }}₽</p>

<p>{{ party.description }}</p>

<a href="{{ url_for('purchase', party_id=party.id) }}" class="btn btn-primary">
    Купить билет
</a>
