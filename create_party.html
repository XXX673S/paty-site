{% extends "base.html" %}

{% block title %}Создать вечеринку | TUSA VIP{% endblock %}

{% block content %}

<section class="centered-form fade-in">
    <div class="form-card">
        <h2>🎉 Создать вечеринку</h2>
        
        <form method="POST">
            <input type="text" name="title" placeholder="Название вечеринки" required>
            
            <textarea name="description" placeholder="Описание" rows="4" required></textarea>
            
            <select name="city" required>
                <option value="">Выберите город</option>
                <option value="Москва">Москва</option>
                <option value="Санкт-Петербург">Санкт-Петербург</option>
                <option value="Казань">Казань</option>
                <option value="Екатеринбург">Екатеринбург</option>
                <option value="Сочи">Сочи</option>
            </select>

            <!-- 🔥 ДОБАВИЛИ location -->
            <input type="text" name="location" placeholder="Адрес (например: Тверская 12)" required>

            <select name="genre" required>
                <option value="">Выберите жанр</option>
                <option value="Техно">Техно</option>
                <option value="Хаус">Хаус</option>
                <option value="Поп">Поп</option>
                <option value="Рок">Рок</option>
            </select>

            <!-- 🔥 ДОБАВИЛИ theme -->
            <input type="text" name="theme" placeholder="Тематика (необязательно)">

            <input type="datetime-local" name="date" required>

            <!-- 🔥 ИСПРАВИЛИ price -->
            <input type="number" name="ticket_price" placeholder="Цена билета (₽)" required>

            <!-- 🔥 ДОБАВИЛИ количество билетов -->
            <input type="number" name="total_tickets" placeholder="Количество билетов" required>

            <input type="number" name="min_age" placeholder="Минимальный возраст" value="18">

            <!-- 🔥 ВРЕМЕННО ПРОСТО URL КАРТИНКИ -->
            <input type="text" name="photo_url" placeholder="Ссылка на фото (можно вставить URL)">

            <button type="submit" class="btn btn-primary">🚀 Создать вечеринку</button>
        </form>
    </div>
</section>

{% endblock %}
