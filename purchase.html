<h2>Покупка билета</h2>

<p>Событие: {{ party.title }}</p>
<p>📍 {{ party.city }}</p>
<p>📅 {{ party.date.strftime('%d.%m.%Y %H:%M') }}</p>
<p>💰 Цена: {{ party.price }}₽</p>

<form method="POST">
    <input type="number" name="quantity" value="1" min="1">
    <button type="submit">Оплатить</button>
</form>
